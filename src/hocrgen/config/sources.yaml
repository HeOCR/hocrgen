version: 1
sources:
  - id: nli_any_use_permitted
    name: National Library of Israel - Any Use Permitted items
    fetcher: nli
    status: allowed
    default_public_release: true
    allowed_content_types:
      - handwritten_modern
      - printed_modern
      - manuscript_scan
    rights_strategy:
      type: exact_match
      values:
        - Any Use Permitted
    normalized_license: PD-IL
    rights_classification: open
    requires_manual_review: false
    source_operations:
      operational_status: active
      health_expectations:
        min_candidates: 1
        min_assets: 1
    settings:
      seed_manifest: package://data/nli/seeds.yaml
  - id: pinkas_open
    name: Pinkas historical open package
    fetcher: pinkas
    status: allowed
    default_public_release: true
    allowed_content_types:
      - handwritten_historical
    rights_strategy:
      type: exact_match
      values:
        - PD-IL
    normalized_license: PD-IL
    rights_classification: open
    requires_manual_review: false
    source_operations:
      operational_status: active
      health_expectations:
        min_candidates: 1
        min_assets: 1
    settings:
      records_path: package://data/pinkas/records.json
      extra:
        source_depth_expansion_manifest: package://data/pinkas/source_depth_expansion.yaml
  - id: biblia_open
    name: BiblIA packaged open subset
    fetcher: biblia
    status: allowed
    default_public_release: true
    allowed_content_types:
      - handwritten_historical
      - printed_historical
    rights_strategy:
      type: exact_match
      values:
        - PD-IL
    normalized_license: PD-IL
    rights_classification: open
    requires_manual_review: false
    source_operations:
      operational_status: active
      health_expectations:
        min_candidates: 1
        min_assets: 1
    settings:
      records_path: package://data/biblia/records.json
      extra:
        source_depth_expansion_manifest: package://data/biblia/source_depth_expansion.yaml
  - id: project_synthetic
    name: hocrsyngen manifest-backed synthetic source
    fetcher: hocrsyngen_manifest
    status: allowed
    default_public_release: true
    allowed_content_types:
      - synthetic_printed_hebrew
      - synthetic_handwritten_like_hebrew
    rights_strategy:
      type: exact_match
      values:
        - PROJECT-SYNTHETIC
    normalized_license: PROJECT-SYNTHETIC
    rights_classification: open
    requires_manual_review: false
    source_operations:
      operational_status: active
      health_expectations:
        min_candidates: 1
        min_assets: 1
    settings:
      hocrsyngen_batch_path: package://data/hocrsyngen/contracts/generation_manifest_v1/fixture-batch
