id: profile_review_v1
description: Review-oriented profile for inspecting milestone-2 acquisitions, including restricted material.
include_sources:
  - nli_any_use_permitted
  - pinkas_open
  - biblia_open
  - project_synthetic
exclude_sources: []
allowed_rights_classifications:
  - open
  - open_with_attribution
  - sharealike
  - restricted_review_only
allow_unknown_rights: true
synthetic_fraction_max: 0.5
privacy_mode: review
publish_targets: []
split_policy:
  train: 0.7
  validation: 0.15
  test: 0.15
