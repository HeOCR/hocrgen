name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        run: coverage run -m pytest

      - name: Validate committed config
        run: hocrgen config validate

      - name: Export coverage XML
        if: always()
        run: coverage xml -o coverage.xml
      - name: Normalize-stage dry-run smoke test
        run: hocrgen normalize --profile profile_open_v1 --dry-run

      - name: End-to-end dry-run build smoke test
        run: hocrgen build-release --profile profile_open_v1 --dry-run

      - name: Upload coverage XML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  pr-agent-context:
    name: PR agent context
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [validate]
    permissions:
      contents: read
      actions: read
      pull-requests: write
    uses: shaypal5/pr-agent-context/.github/workflows/pr-agent-context.yml@v4
    with:
      tool_ref: v4
      publish_mode: append
      include_patch_coverage: true
      patch_coverage_source_mode: coverage_xml_artifact
      coverage_report_artifact_name: coverage-xml
      coverage_report_filename: coverage.xml
      coverage_source_workflows: Validate
      wait_for_checks_to_settle: true
      debug_artifacts: true
