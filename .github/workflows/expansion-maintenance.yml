name: expansion-maintenance

on:
  workflow_dispatch:
    inputs:
      run_scope:
        description: Which scheduled maintenance slice to run.
        required: false
        default: all
        type: choice
        options:
          - all
          - discovery
          - synthetic
          - review_build
          - open_build
      max_items:
        description: Optional max-items override for discovery/import stages.
        required: false
        default: ""
        type: string
      synthetic_seed:
        description: Optional synthetic seed override.
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 4 * * 1"

concurrency:
  group: expansion-maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discovery_review:
    if: >-
      ${{
        github.event_name == 'schedule' ||
        github.event.inputs.run_scope == 'all' ||
        github.event.inputs.run_scope == 'discovery' ||
        github.event.inputs.run_scope == 'review_build'
      }}
    uses: ./.github/workflows/hocrgen-dry-run.yml
    with:
      artifact_name: hocrgen-discovery-review-${{ github.run_id }}
      max_items: ${{ github.event.inputs.max_items || '' }}
      profile: profile_review_v1
      stage: policy-filter
      synthetic_seed: ${{ github.event.inputs.synthetic_seed || '' }}

  review_build:
    if: >-
      ${{
        github.event_name == 'schedule' ||
        github.event.inputs.run_scope == 'all' ||
        github.event.inputs.run_scope == 'review_build'
      }}
    needs: [discovery_review]
    # review_build intentionally depends on a same-run discovery_review artifact rather than
    # falling back to older artifacts from prior runs.
    uses: ./.github/workflows/hocrgen-dry-run.yml
    with:
      artifact_name: hocrgen-review-build-${{ github.run_id }}
      max_items: ${{ github.event.inputs.max_items || '' }}
      profile: profile_review_v1
      resume_artifact_name: hocrgen-discovery-review-${{ github.run_id }}
      resume_artifact_path: .work/resume/discovery_review
      stage: build-release
      synthetic_seed: ${{ github.event.inputs.synthetic_seed || '' }}

  synthetic_build:
    if: >-
      ${{
        github.event_name == 'schedule' ||
        github.event.inputs.run_scope == 'all' ||
        github.event.inputs.run_scope == 'synthetic'
      }}
    uses: ./.github/workflows/hocrgen-dry-run.yml
    with:
      artifact_name: hocrgen-synthetic-build-${{ github.run_id }}
      max_items: ${{ github.event.inputs.max_items || '' }}
      profile: profile_review_v1
      source: project_synthetic
      stage: build-release
      synthetic_seed: ${{ github.event.inputs.synthetic_seed || '' }}

  open_build:
    if: >-
      ${{
        github.event_name == 'schedule' ||
        github.event.inputs.run_scope == 'all' ||
        github.event.inputs.run_scope == 'open_build'
      }}
    uses: ./.github/workflows/hocrgen-dry-run.yml
    with:
      artifact_name: hocrgen-open-build-${{ github.run_id }}
      max_items: ${{ github.event.inputs.max_items || '' }}
      profile: profile_open_v1
      stage: build-release
      synthetic_seed: ${{ github.event.inputs.synthetic_seed || '' }}
